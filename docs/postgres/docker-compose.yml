version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: vultr
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vultr
    ports:
      - "5432:5432"
    volumes:
      - ./data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - external-net

networks:
  external-net:
    external: true
    name: gscores # Points to the exact same manual network
