version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: gscores_postgres
    restart: always
    environment:
      POSTGRES_USER: vultr
      POSTGRES_PASSWORD: webdev-a-project-3
      POSTGRES_DB: vultr
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vultr -d vultr"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: node:20-alpine
    container_name: gscores_backend
    restart: always
    working_dir: /app
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./dataset:/dataset
    environment:
      DATABASE_URL: "postgresql://vultr:webdev-a-project-3@db:5432/vultr"
      PORT: 3001
      FRONTEND_URL: "http://localhost:5173"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "apk add --no-cache openssl &&
             npm install &&
             npx prisma db push --accept-data-loss &&
             npm run dev"

  frontend:
    image: node:20-alpine
    container_name: gscores_frontend
    restart: always
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: "http://localhost:3001"
    command: >
      sh -c "npm install &&
             npm run dev -- --host"

volumes:
  postgres_data:
